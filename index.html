<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Tareas 911 Staff</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#f5c518">
<style>
  :root{
    --bg:#1c1c1e; --panel:#28282a; --line:#3c3c3f;
    --ink:#f0f0f0; --muted:#9a9a9d; --accent:#f5c518; --accent-ink:#1c1c1e;
    --mono:'JetBrains Mono','SF Mono',Consolas,monospace;
    --serif:'Georgia','Times New Roman',serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--mono);min-height:100vh;}

  /* ---------- Pantalla de selección de identidad ---------- */
  .center{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:26px;}
  .logo{max-width:150px;}
  .identityRow{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
  .identityBtn{
    width:150px;height:110px;border-radius:14px;background:var(--panel);border:1px solid var(--line);
    color:var(--ink);font-family:var(--mono);font-size:15px;font-weight:700;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  }
  .identityBtn:hover{border-color:var(--accent);}
  .identityBtn .dot{width:34px;height:34px;border-radius:50%;background:var(--accent);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;font-weight:800;}

  /* ---------- Pantalla de chat ---------- */
  .topbar{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:5;}
  .topbar img{height:30px;}
  .topbar .who{flex:1;font-size:13px;color:var(--muted);}
  .topbar .who b{color:var(--ink);}
  .topbar button{background:none;border:1px solid var(--line);color:var(--muted);border-radius:6px;padding:6px 10px;font-family:var(--mono);font-size:10.5px;cursor:pointer;}
  .topbar button:hover{color:var(--ink);border-color:var(--accent);}
  .toneToggle{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .toneToggle button{border:none;border-radius:0;padding:6px 10px;font-size:10.5px;background:#232325;color:var(--muted);}
  .toneToggle button.active{background:var(--accent);color:var(--accent-ink);font-weight:700;}
  .toneToggle button:hover{border-color:transparent;}

  .chatWrap{max-width:640px;margin:0 auto;padding:20px 14px 140px;display:flex;flex-direction:column;gap:12px;min-height:calc(100vh - 60px);}
  .bubbleRow{display:flex;transition:opacity 1.2s ease;}
  .bubbleRow.me{justify-content:flex-end;}
  .bubbleRow.ai{justify-content:flex-start;}
  .bubble{
    max-width:82%;padding:12px 14px;border-radius:14px;font-size:13.5px;line-height:1.5;white-space:pre-wrap;
  }
  .bubble.me{background:rgba(245,197,24,0.28);border:1px solid rgba(245,197,24,0.5);border-bottom-right-radius:3px;}
  .bubble.ai{background:rgba(245,197,24,0.09);border:1px solid rgba(245,197,24,0.25);border-bottom-left-radius:3px;}
  .bubble .metaLine{font-size:10.5px;color:var(--muted);margin-bottom:6px;}
  .bubble .actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .bubble .actions button{
    padding:6px 12px;border-radius:6px;border:1px solid var(--line);background:#232325;color:var(--muted);
    cursor:pointer;font-family:var(--mono);font-size:11.5px;
  }
  .bubble .actions .sendBtn{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);font-weight:700;}
  .bubble .actions button:hover{filter:brightness(1.05);}
  .bubble input[type=text]{
    width:100%;background:#1a1a1c;border:1px solid var(--line);color:var(--ink);
    padding:7px 9px;border-radius:6px;font-family:var(--mono);font-size:12.5px;margin-top:6px;
  }
  .typingDots{display:inline-flex;gap:3px;}
  .typingDots span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite;}
  .typingDots span:nth-child(2){animation-delay:.2s;}
  .typingDots span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.2;}40%{opacity:1;}}

  .fadeOut{opacity:0 !important;}

  .inputBar{position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--line);padding:12px 14px;display:flex;gap:10px;justify-content:center;}
  .inputBar .inner{max-width:640px;width:100%;display:flex;gap:8px;}
  .inputBar textarea{
    flex:1;resize:none;background:rgba(245,197,24,0.10);border:1px solid rgba(245,197,24,0.35);
    color:var(--ink);border-radius:10px;padding:10px 12px;font-family:var(--mono);font-size:13.5px;
    min-height:44px;max-height:120px;
  }
  .inputBar textarea:focus{outline:none;border-color:var(--accent);background:rgba(245,197,24,0.18);}
  .inputBar button{
    background:var(--accent);border:none;color:var(--accent-ink);border-radius:10px;padding:0 18px;
    font-weight:700;cursor:pointer;font-family:var(--mono);
  }
  .hidden{display:none !important;}
</style>
</head>

<script>
const IDENTITIES = {
  oficina: { label: 'OFICINA (info@911staff.com)' },
  diego:   { label: 'DIEGO (edicion@911staff.com)' },
};

// Ajusta estas URLs a las de tu proyecto de Supabase.
const DRAFT_FN_URL = 'https://dtdcetyultwhjtwtzzcq.supabase.co/functions/v1/tareas-draft';
const SEND_FN_URL  = 'https://dtdcetyultwhjtwtzzcq.supabase.co/functions/v1/tareas-send';
const SEARCH_FN_URL = 'https://dtdcetyultwhjtwtzzcq.supabase.co/functions/v1/tareas-search-contacts';

let currentIdentity = null;
let currentTone = 'cercano';
let pendingDraft = null; // { to, subject, body }

function setTone(tone){
  currentTone = tone;
  document.getElementById('toneCercano').classList.toggle('active', tone==='cercano');
  document.getElementById('toneSerio').classList.toggle('active', tone==='serio');
}

function selectIdentity(id){
  currentIdentity = id;
  document.getElementById('identityScreen').classList.add('hidden');
  document.getElementById('chatScreen').classList.remove('hidden');
  document.getElementById('identityLabel').textContent = IDENTITIES[id].label;
  document.getElementById('taskInput').focus();
}
function changeIdentity(){
  document.getElementById('chatWrap').innerHTML = '';
  document.getElementById('chatScreen').classList.add('hidden');
  document.getElementById('identityScreen').classList.remove('hidden');
  currentIdentity = null;
  pendingDraft = null;
}

function addBubble(text, who, opts){
  opts = opts || {};
  const wrap = document.getElementById('chatWrap');
  const row = document.createElement('div');
  row.className = 'bubbleRow ' + who;
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + who;
  if(opts.meta){
    const meta = document.createElement('div');
    meta.className = 'metaLine';
    meta.textContent = opts.meta;
    bubble.appendChild(meta);
  }
  const textNode = document.createElement('div');
  textNode.textContent = text;
  bubble.appendChild(textNode);
  row.appendChild(bubble);
  wrap.appendChild(row);
  window.scrollTo(0, document.body.scrollHeight);
  return bubble;
}

function addTypingBubble(){
  const wrap = document.getElementById('chatWrap');
  const row = document.createElement('div');
  row.className = 'bubbleRow ai';
  row.id = 'typingRow';
  row.innerHTML = `<div class="bubble ai"><span class="typingDots"><span></span><span></span><span></span></span></div>`;
  wrap.appendChild(row);
  window.scrollTo(0, document.body.scrollHeight);
}
function removeTypingBubble(){
  const el = document.getElementById('typingRow');
  if(el) el.remove();
}

function fadeAwayConversation(){
  const wrap = document.getElementById('chatWrap');
  wrap.classList.add('fadeOut');
  setTimeout(()=>{ wrap.innerHTML = ''; wrap.classList.remove('fadeOut'); }, 1200);
}

async function handleSendTask(){
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  addBubble(text, 'me');
  addTypingBubble();

  try{
    const res = await fetch(DRAFT_FN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ instruction: text, sender: currentIdentity, tone: currentTone }),
    });
    const data = await res.json();
    removeTypingBubble();
    if(!data.ok){
      addBubble('No he podido redactarlo: ' + (data.error || 'error desconocido'), 'ai');
      return;
    }
    pendingDraft = { to: data.to, subject: data.subject, body: data.body };

    if(!data.to){
      addTypingBubble();
      let candidates = [];
      if(data.recipientName){
        try{
          const searchRes = await fetch(SEARCH_FN_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: data.recipientName }),
          });
          const searchData = await searchRes.json();
          if(searchData.ok) candidates = searchData.candidates || [];
        }catch(_e){ /* si falla la búsqueda, seguimos con el campo manual */ }
      }
      removeTypingBubble();

      const bubble = addBubble('', 'ai', { meta: 'Falta el destinatario' + (data.recipientName ? ' de "' + data.recipientName + '"' : '') });

      if(candidates.length > 0){
        const p = document.createElement('div');
        p.textContent = 'He encontrado estas direcciones en tu correo. ¿Cuál es?';
        bubble.appendChild(p);
        const actions = document.createElement('div');
        actions.className = 'actions';
        actions.style.flexWrap = 'wrap';
        candidates.forEach(c=>{
          const btn = document.createElement('button');
          btn.textContent = (c.name ? c.name + ' — ' : '') + c.email;
          btn.onclick = ()=>{ pendingDraft.to = c.email; showConfirmationBubble(); };
          actions.appendChild(btn);
        });
        const otherBtn = document.createElement('button');
        otherBtn.textContent = 'Otra dirección...';
        otherBtn.onclick = ()=> showManualRecipientInput(bubble);
        actions.appendChild(otherBtn);
        bubble.appendChild(actions);
      } else {
        const p = document.createElement('div');
        p.textContent = 'No he encontrado ninguna dirección para ese nombre en tu correo. ¿A qué dirección lo envío?';
        bubble.appendChild(p);
        showManualRecipientInput(bubble);
      }
      return;
    }

    showConfirmationBubble();
  }catch(err){
    removeTypingBubble();
    addBubble('Error de conexión: ' + err.message, 'ai');
  }
}

function showManualRecipientInput(bubble){
  const input2 = document.createElement('input');
  input2.type = 'text';
  input2.placeholder = 'nombre@ejemplo.com';
  bubble.appendChild(input2);
  const actions = document.createElement('div');
  actions.className = 'actions';
  const okBtn = document.createElement('button');
  okBtn.className = 'sendBtn';
  okBtn.textContent = 'Continuar';
  okBtn.onclick = ()=>{
    const addr = input2.value.trim();
    if(!addr.includes('@')){ input2.style.borderColor = '#e5544b'; return; }
    pendingDraft.to = addr;
    showConfirmationBubble();
  };
  actions.appendChild(okBtn);
  bubble.appendChild(actions);
  input2.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); okBtn.click(); } });
  input2.focus();
}

function showConfirmationBubble(){
  const bubble = addBubble('', 'ai', {
    meta: `Para: ${pendingDraft.to}  ·  Asunto: ${pendingDraft.subject}`
  });
  const bodyNode = document.createElement('div');
  bodyNode.textContent = pendingDraft.body;
  bubble.appendChild(bodyNode);

  const actions = document.createElement('div');
  actions.className = 'actions';
  const sendBtn = document.createElement('button');
  sendBtn.className = 'sendBtn';
  sendBtn.textContent = 'Enviar';
  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = 'Cancelar';
  cancelBtn.onclick = ()=>{ pendingDraft = null; fadeAwayConversation(); };
  sendBtn.onclick = async ()=>{
    sendBtn.disabled = true;
    sendBtn.textContent = 'Enviando...';
    try{
      const res = await fetch(SEND_FN_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sender: currentIdentity, to: pendingDraft.to, subject: pendingDraft.subject, body: pendingDraft.body }),
      });
      const data = await res.json();
      if(data.ok){
        addBubble('✓ Enviado' + (data.savedCopy ? ' y guardado en Enviados.' : ' (sin poder guardar copia en Enviados).'), 'ai');
        setTimeout(fadeAwayConversation, 1800);
      } else {
        addBubble('No se pudo enviar: ' + (data.error || 'error desconocido'), 'ai');
        sendBtn.disabled = false;
        sendBtn.textContent = 'Enviar';
      }
    }catch(err){
      addBubble('Error de conexión al enviar: ' + err.message, 'ai');
      sendBtn.disabled = false;
      sendBtn.textContent = 'Enviar';
    }
  };
  actions.appendChild(sendBtn);
  actions.appendChild(cancelBtn);
  bubble.appendChild(actions);
}

document.getElementById('sendTaskBtn').addEventListener('click', handleSendTask);
document.getElementById('taskInput').addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    handleSendTask();
  }
});
document.getElementById('taskInput').addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
